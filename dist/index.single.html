<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
* {
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    min-height: 100%;
    margin: 0;
}

body {
    display: block;
    padding: 32px;
    background: radial-gradient(circle at top, #1f2937 0%, #111827 45%, #090d16 100%);
    color: #e5e7eb;
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.editor {
    position: fixed;
    width: min(860px, 100%);
    height: min(78vh, 760px);
    min-width: 420px;
    min-height: 320px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    resize: both;
    border: 1px solid #334155;
    border-radius: 16px;
    background: #0f172a;
    box-shadow: 0 18px 48px rgba(2, 6, 23, 0.55);
}

.editor-tabs {
    position: absolute;
    top: 36px;
    right: 0;
    left: 0;
    height: 32px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding: 0 10px 0 10px;
    border-bottom: 1px solid #334155;
    background: #0e1628;
}

.editor-tab {
    height: 22px;
    padding: 0 10px;
    border: 1px solid #334155;
    border-radius: 6px 6px 0 0;
    background: #172136;
    color: #cbd5e1;
    font-size: 12px;
    cursor: pointer;
}

.editor-tab.active {
    background: #2563eb;
    border-color: #2563eb;
    color: #eff6ff;
}

.editor-panel {
    position: absolute;
    inset: 68px 0 0 0;
    overflow: auto;
}

.inspector {
    padding: 18px;
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.98) 100%);
}

.json-panel {
    display: none;
    padding: 12px;
    background: #0f172a;
    flex-direction: column;
    gap: 8px;
}

.json-panel.active {
    display: flex;
}

.json-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-start;
}

.json-format-button {
    height: 24px;
    padding: 0 10px;
    border: 1px solid #22c55e;
    border-radius: 6px;
    background: #15803d;
    color: #dcfce7;
    font-size: 12px;
    cursor: pointer;
}

.json-format-button:hover {
    background: #16a34a;
}

.json-format-button:focus {
    outline: none;
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
}

.json-editor-wrap {
    flex: 1;
    min-height: 180px;
    display: flex;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0b1220;
    overflow: hidden;
}

.json-line-numbers {
    width: 48px;
    padding: 10px 8px 10px 10px;
    border-right: 1px solid #334155;
    color: #64748b;
    background: #0a1020;
    font-size: 12px;
    line-height: 1.4;
    text-align: right;
    white-space: pre;
    overflow: hidden;
    user-select: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}

.json-line-number {
    height: 16.8px;
}

.json-line-number.error {
    color: #fca5a5;
    font-weight: 700;
}

.editor-panel.active {
    display: block;
}

.json-panel.editor-panel.active {
    display: flex;
}

.json-output {
    width: calc(100% - 48px);
    flex: 1;
    min-height: 0;
    height: auto;
    border: none;
    border-radius: 0;
    background: #0b1220;
    color: #e2e8f0;
    font-size: 12px;
    line-height: 1.4;
    padding: 10px;
    resize: none;
    outline: none;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}

.json-output.invalid {
    border-color: #ef4444;
    box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.22);
}

.json-error {
    min-height: 16px;
    color: #fca5a5;
    font-size: 11px;
    line-height: 1.3;
    white-space: pre-wrap;
    visibility: hidden;
}

.json-error.active {
    visibility: visible;
}

.drag-handle {
    position: absolute;
    top: 0;
    right: 0;
    left: 0;
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid #334155;
    background: #111827;
    color: #cbd5e1;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: lowercase;
    cursor: move;
    user-select: none;
}

.frame {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin: 3px 0;
}

.foldout-frame {
    display: block;
}

.foldout-header {
    display: flex;
    align-items: center;
    gap: 8px;
}

.foldout-toggle {
    flex: none;
    width: 20px;
    height: 20px;
    padding: 0;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #172136;
    color: #dbeafe;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
}

.row-drag-handle {
    flex: none;
    width: 20px;
    height: 20px;
    padding: 0;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #172136;
    color: #94a3b8;
    font-size: 11px;
    line-height: 1;
    cursor: grab;
}

.row-drag-handle:active {
    cursor: grabbing;
}

.frame.is-dragging {
    opacity: 0.65;
}

.frame .label {
    flex-shrink: 0;
    width: 96px;
    min-width: 72px;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #1e293b;
    color: #93c5fd;
    font-size: 13px;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
}

.drawer-type-select {
    flex: none;
    width: 66px;
    height: 28px;
    padding: 0 6px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #172136;
    color: #cbd5e1;
    font-size: 12px;
    outline: none;
}

.drawer-type-select:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
}

.delete-entry-button {
    flex: none;
    width: 24px;
    height: 24px;
    padding: 0;
    border: 1px solid #ef4444;
    border-radius: 8px;
    background: #7f1d1d;
    color: #fecaca;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
}

.delete-entry-button:hover {
    background: #991b1b;
}

.frame .label:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    background: #243447;

.frame > .text-value,
.frame > .number-value {

    min-width: 0;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #111827;
    color: #f3f4f6;
    font-size: 13px;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;

.color-drawer-stack {

    min-width: 0;

    align-items: center;
    gap: 4px;

.image-link-stack {

    align-items: center;
    gap: 4px;

.vector3-stack {

.vector3-item {

.vector3-key {

.vector3-field {

    height: 28px;
    padding: 4px 8px;
    border: 1px solid #334155;
    border-radius: 8px;

    color: #f3f4f6;
    font-size: 13px;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;

.vector3-field:focus {

    padding: 4px 8px;

    border-radius: 8px;
    background: #111827;
    color: #f3f4f6;
    font-size: 13px;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;

.color-drawer-stack > .text-value {
    flex: 1;
    min-width: 0;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #111827;
    color: #f3f4f6;
    font-size: 13px;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
}

.image-link-stack > .text-value:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    background: #182134;
}

.color-drawer-stack > .text-value:focus {

.color-picker-value {

.frame > .boolean-value {

.add-entry-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    padding: 0;
    border: 1px solid #22c55e;
    border-radius: 8px;
    background: #15803d;
    color: #dcfce7;
    font-size: 18px;
    font-weight: 700;

    <script>
function createTypeSelector(drawerType, onTypeChange) {
    var types = typeof drawerTypeList !== "undefined" ? drawerTypeList : ["string", "number", "boolean", "object", "array"];
    var typeSelect = document.createElement("select");
    typeSelect.classList.add("drawer-type-select");
    typeSelect.innerHTML = types.map(function (type) {
        return '<option value="' + type + '">' + type + "</option>";
    }).join("");
    typeSelect.value = drawerType;
    if (typeof onTypeChange === "function") {
        typeSelect.addEventListener("change", function () {
            onTypeChange(typeSelect.value);
        });
    }
    return typeSelect;
}

    <script>
var activeDragFrame = null;
var activeDragParent = null;

function reorderBoundCollectionFromDom(parentEl) {
    var frames = Array.prototype.filter.call(parentEl.children, function (node) {
        return node && node.classList && node.classList.contains("frame");
    });
    if (frames.length < 2) return false;
    var bindings = frames.map(function (frame) {
        return frame._bindingRef;
    });
    var firstBinding = bindings[0];
    if (!firstBinding || !firstBinding.parent) return false;
    var parentValue = firstBinding.parent;
    if (Array.isArray(parentValue)) {
        var nextOrder = [];
        var validArrayOrder = true;
        bindings.forEach(function (binding) {
            if (!binding || typeof binding.key !== "number") {
                validArrayOrder = false;
                return;
            }
            if (binding.key < 0 || binding.key >= parentValue.length) {
                validArrayOrder = false;
                return;
            }
            nextOrder.push(parentValue[binding.key]);
        });
        if (!validArrayOrder || nextOrder.length !== parentValue.length) return false;
        var arrayChanged = nextOrder.some(function (entry, index) {
            return entry !== parentValue[index];
        });
        if (!arrayChanged) return false;
        parentValue.length = 0;
        nextOrder.forEach(function (entry) {
            parentValue.push(entry);
        });
        return true;
    }
    if (!parentValue || typeof parentValue !== "object") return false;
    var oldKeys = Object.keys(parentValue);
    if (!oldKeys.length) return false;
    var seen = {};
    var orderedKeys = [];
    bindings.forEach(function (binding) {
        if (!binding || typeof binding.key !== "string") return;
        if (!Object.prototype.hasOwnProperty.call(parentValue, binding.key)) return;
        if (seen[binding.key]) return;
        seen[binding.key] = true;
        orderedKeys.push(binding.key);
    });
    oldKeys.forEach(function (key) {
        if (seen[key]) return;
        orderedKeys.push(key);
    });
    if (orderedKeys.length !== oldKeys.length) return false;
    var objectChanged = orderedKeys.some(function (key, index) {
        return key !== oldKeys[index];
    });
    if (!objectChanged) return false;
    var nextObject = {};
    orderedKeys.forEach(function (key) {
        nextObject[key] = parentValue[key];
    });
    oldKeys.forEach(function (key) {
        delete parentValue[key];
    });
    orderedKeys.forEach(function (key) {
        parentValue[key] = nextObject[key];
    });
    return true;
}

function stopReorderDrag() {
    if (!activeDragFrame) return;
    var didReorder = false;
    if (activeDragParent) {
        didReorder = reorderBoundCollectionFromDom(activeDragParent);
    }
    activeDragFrame.classList.remove("is-dragging");
    activeDragFrame = null;
    activeDragParent = null;
    document.body.style.userSelect = "";
    if (!didReorder) return;
    if (typeof notifyMutation === "function") {
        notifyMutation();
    }
    if (typeof window !== "undefined" && typeof window.requestInspectorRefresh === "function") {
        window.requestInspectorRefresh();
    }
}

function onReorderDragMove(event) {
    if (!activeDragFrame || !activeDragParent) return;
    var target = document.elementFromPoint(event.clientX, event.clientY);
    if (!target) return;
    var targetFrame = target.closest(".frame");
    if (!targetFrame || targetFrame === activeDragFrame) return;
    if (targetFrame.parentNode !== activeDragParent) return;
    var rect = targetFrame.getBoundingClientRect();
    var insertBefore = event.clientY < rect.top + rect.height / 2;
    if (insertBefore) {
        if (activeDragFrame !== targetFrame.previousSibling) {
            activeDragParent.insertBefore(activeDragFrame, targetFrame);
        }
    } else {
        if (activeDragFrame !== targetFrame.nextSibling) {
            activeDragParent.insertBefore(activeDragFrame, targetFrame.nextSibling);
        }
    }
}

function createRowDragHandle(frame) {
    var dragHandle = document.createElement("button");
    dragHandle.type = "button";
    dragHandle.classList.add("row-drag-handle");
    dragHandle.textContent = "⋮⋮";
    dragHandle.addEventListener("mousedown", function (event) {
        if (event.button !== 0) return;
        activeDragFrame = frame;
        activeDragParent = frame.parentNode;
        frame.classList.add("is-dragging");
        document.body.style.userSelect = "none";
        event.preventDefault();
    });
    return dragHandle;
}

function createDrawerFrame(container, label, valueClass, drawerType, onTypeChange, onDelete, beforeNode, binding) {
    var frame = document.createElement("div");
    var dragHandle = createRowDragHandle(frame);
    var labelEl = document.createElement("input");
    var deleteButton = createDeleteButton(container, label, onDelete);
    var typeSelect = createTypeSelector(drawerType, onTypeChange);
    var isFoldout = valueClass === "object-value" || valueClass === "array-value";
    labelEl.type = "text";
    labelEl.classList.add("label");
    var valueEl = isFoldout
        ? document.createElement("div")
        : document.createElement("input");
    valueEl.classList.add(valueClass);
    if (valueEl instanceof HTMLInputElement) {
        valueEl.type = "text";
    }
    frame.classList.add("frame");
    frame._bindingRef = binding || null;
    if (isFoldout) {
        frame.classList.add("foldout-frame");
        if (binding && binding.path) {
            frame.setAttribute("data-binding-path", binding.path);
        }
    }
    if (beforeNode) {
        container.insertBefore(frame, beforeNode);
    } else {
        container.appendChild(frame);
    }
    if (isFoldout) {
        var headerEl = document.createElement("div");
        var toggleEl = document.createElement("button");
        var isRootInspectorDrawer = container.classList.contains("inspector") && label === "json";
        var shouldStartCollapsed = !isRootInspectorDrawer;
        headerEl.classList.add("foldout-header");
        toggleEl.type = "button";
        toggleEl.classList.add("foldout-toggle");
        toggleEl.textContent = shouldStartCollapsed ? "▸" : "▾";
        toggleEl.addEventListener("click", function () {
            var isCollapsed = frame.classList.toggle("collapsed");
            valueEl.hidden = isCollapsed;
            toggleEl.textContent = isCollapsed ? "▸" : "▾";
        });
        frame.appendChild(headerEl);
        headerEl.appendChild(dragHandle);
        headerEl.appendChild(toggleEl);
        headerEl.appendChild(labelEl);
        headerEl.appendChild(typeSelect);
        headerEl.appendChild(deleteButton);
        frame.appendChild(valueEl);
        if (shouldStartCollapsed) {
            frame.classList.add("collapsed");
            valueEl.hidden = true;
        }
    } else {
        frame.appendChild(dragHandle);
        frame.appendChild(labelEl);
        frame.appendChild(typeSelect);
        frame.appendChild(valueEl);
        frame.appendChild(deleteButton);
    }
    labelEl.value = label;
    setLabelVisibility(labelEl, label);
    return { frame: frame, label: labelEl, value: valueEl };
}

window.addEventListener("mousemove", onReorderDragMove);
window.addEventListener("mouseup", stopReorderDrag);

</script>

function drawString(ctx, container, label, value, beforeNode, binding) {
    var t = ctx.createDrawerFrame(container, label, "text-value", "string", function (nextType) {
        ctx.replaceDrawer(container, t.frame, label, nextType, value, binding);
    }, function () {
        ctx.deleteBoundValue(binding);
        container.removeChild(t.frame);
    }, beforeNode, binding);
    t.value.type = "text";
    t.value.value = value == null ? "" : String(value);
    t.value.addEventListener("input", function () {
        ctx.setBoundValue(binding, t.value.value);
    });
    ctx.bindLabelInput(t.label, binding);
}

    <script>
function isHexColor(value) {
    return /^#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/.test(value);
}

function toLongHex(value) {
    if (!isHexColor(value)) return "#000000";
    if (value.length === 7) return value.toLowerCase();
    return ("#" + value[1] + value[1] + value[2] + value[2] + value[3] + value[3]).toLowerCase();
}

function drawColor(ctx, container, label, value, beforeNode, binding) {
    var t = ctx.createDrawerFrame(container, label, "text-value", "color", function (nextType) {
        ctx.replaceDrawer(container, t.frame, label, nextType, value, binding);
    }, function () {
        ctx.deleteBoundValue(binding);
        container.removeChild(t.frame);
    }, beforeNode, binding);
    var colorStack = document.createElement("div");
    var colorPicker = document.createElement("input");
    colorStack.classList.add("color-drawer-stack");
    colorPicker.classList.add("color-picker-value");
    colorPicker.type = "color";
    t.value.type = "text";
    t.value.value = value == null ? "" : String(value);
    colorPicker.value = toLongHex(t.value.value);
    t.value.addEventListener("input", function () {
        if (isHexColor(t.value.value)) {
            colorPicker.value = toLongHex(t.value.value);
        }
        ctx.setBoundValue(binding, t.value.value);
    });
    colorPicker.addEventListener("input", function () {
        t.value.value = colorPicker.value;
        ctx.setBoundValue(binding, colorPicker.value);
    });
    ctx.bindLabelInput(t.label, binding);
    t.frame.replaceChild(colorStack, t.value);
    colorStack.appendChild(t.value);
    colorStack.appendChild(colorPicker);
}

</script>

function isImageUrl(value) {

        if (errorLine === i) {
            row.classList.add("error");
        }
        row.textContent = String(i);
        lineNumbers.appendChild(row);
    }
    lineNumbers.scrollTop = jsonOutput.scrollTop;
}

function rebuildStateFromJsonText(inspector, jsonOutput, jsonError, state, rawJsonText, renderInspector) {
    try {
        var nextJson = JSON.parse(rawJsonText);
        state.json = nextJson;
        state.jsonBinding.parent = state;
        if (typeof importTypeHintsSnapshot === "function") {
            importTypeHintsSnapshot({});
        }
        renderInspector(inspector, state);
        setJsonValidationError(jsonOutput, jsonError, "", null);
        return true;
    } catch (err) {
        setJsonValidationError(
            jsonOutput,
            jsonError,
            err && err.message ? err.message : "Invalid JSON",
            resolveJsonErrorLine(rawJsonText, err)
        );
        return false;
    }
}

function setJsonValidationError(jsonOutput, jsonError, message, errorLine) {
    var text = message || "";
    if (text.length) {
        jsonOutput.classList.add("invalid");
        jsonError.textContent = text;
        jsonError.classList.add("active");
        jsonOutput._errorLine = typeof errorLine === "number" && errorLine > 0 ? errorLine : null;
        syncJsonLineNumbers(jsonOutput);
        return;
    }
    jsonOutput.classList.remove("invalid");
    jsonError.textContent = "";
    jsonError.classList.remove("active");
    jsonOutput._errorLine = null;
    syncJsonLineNumbers(jsonOutput);
}

function formatJsonString(rawText) {
    try {
        var parsed = JSON.parse(rawText);
        return { ok: true, value: JSON.stringify(parsed, null, 2) };
    } catch (err) {
        return {
            ok: false,
            errorMessage: err && err.message ? err.message : "Invalid JSON",
            errorObject: err
        };
    }
}

function insertSpacesAtCaret(textarea, spaces) {
    var start = textarea.selectionStart;
    var end = textarea.selectionEnd;
    var current = textarea.value;
    textarea.value = current.slice(0, start) + spaces + current.slice(end);
    var nextCursor = start + spaces.length;
    textarea.selectionStart = nextCursor;
    textarea.selectionEnd = nextCursor;
}

function resolveJsonErrorLine(rawJsonText, errorObject) {
    if (!errorObject || typeof errorObject.message !== "string") return null;
    var message = errorObject.message;
    var lineColumnMatch = message.match(/line\s+([0-9]+)\s+column\s+([0-9]+)/i);
    if (lineColumnMatch) {
        var line = Number(lineColumnMatch[1]);
        return Number.isFinite(line) && line > 0 ? line : null;
    }
    var positionMatch = message.match(/position\s+([0-9]+)/i);
    if (!positionMatch) return null;
    var position = Number(positionMatch[1]);
    if (!Number.isFinite(position) || position < 0) return null;
    return rawJsonText.slice(0, position).split("\n").length;
}

</script>
    <script>
function main() {
    let state =
    {
        json: {
            "text": "text",
            "color": "#000000",
            "int": 16,
            "float": 16.5,
            "boolean": true,
            "dictionary": {
                "key": "value",
                "key2": "value2"
            },
            "array": [1, { "key": "value" }, 3],
            "object": {
                "name": "John",
                "age": 30,
                "position": {
                    "x": 1,
                    "y": 2,
                    "z": 3
                }
            }
        },
        jsonBinding: { path: "$", parent: null, key: "json" },
        history: null
    };
    state.jsonBinding.parent = state;
    ensureHistory(state);
    var pendingHistoryCommit = false;

    const editor = document.querySelector(".editor");
    const dragHandle = document.createElement("div");
    const tabs = document.createElement("div");
    const inspectorTab = document.createElement("button");
    const jsonTab = document.createElement("button");
    const inspector = document.createElement("div");
    const jsonTabElements = createJsonTabElements();
    const jsonPanel = jsonTabElements.panel;
    const jsonOutput = jsonTabElements.output;
    const jsonError = jsonTabElements.error;
    const formatJsonButton = jsonTabElements.formatButton;
    dragHandle.classList.add("drag-handle");
    dragHandle.textContent = "json editor";
    tabs.classList.add("editor-tabs");
    inspectorTab.type = "button";
    jsonTab.type = "button";
    inspectorTab.classList.add("editor-tab", "active");
    jsonTab.classList.add("editor-tab");
    inspectorTab.textContent = "inspector";
    jsonTab.textContent = "json";
    inspector.classList.add("inspector", "editor-panel", "active");
    tabs.appendChild(inspectorTab);
    tabs.appendChild(jsonTab);
    editor.appendChild(dragHandle);
    editor.appendChild(tabs);
    editor.appendChild(inspector);
    editor.appendChild(jsonPanel);
    enableEditorDragging(editor, dragHandle);
    placeEditorInCenter(editor);
    renderInspector(inspector, state);
    window.onInspectorMutation = function () {
        if (shouldDeferHistoryCommit(document.activeElement)) {
            pendingHistoryCommit = true;
            return;
        }
        recordHistoryChange(state);
        if (jsonPanel.classList.contains("active") && document.activeElement !== jsonOutput) {
            syncJsonOutput(jsonOutput, state);
        }
    };
    window.requestInspectorRefresh = function () {
        var foldoutStates = captureFoldoutStates(inspector);
        renderInspector(inspector, state);
        applyFoldoutStates(inspector, foldoutStates);
        if (jsonPanel.classList.contains("active") && document.activeElement !== jsonOutput) {
            syncJsonOutput(jsonOutput, state);
        }
    };
    document.addEventListener("focusout", function () {
        if (!pendingHistoryCommit) return;
        window.setTimeout(function () {
            if (shouldDeferHistoryCommit(document.activeElement)) return;
            pendingHistoryCommit = false;
            recordHistoryChange(state);
        }, 0);
    });
    registerHistoryShortcuts(document, function () {
        if (!undoHistory(state)) return;
        var foldoutStates = captureFoldoutStates(inspector);
        renderInspector(inspector, state);
        applyFoldoutStates(inspector, foldoutStates);
        syncJsonOutput(jsonOutput, state);
        setJsonValidationError(jsonOutput, jsonError, "");
    }, function () {
        if (!redoHistory(state)) return;
        var foldoutStates = captureFoldoutStates(inspector);
        renderInspector(inspector, state);
        applyFoldoutStates(inspector, foldoutStates);
        syncJsonOutput(jsonOutput, state);
        setJsonValidationError(jsonOutput, jsonError, "");
    });
    setupJsonTextTab({
        inspector: inspector,
        inspectorTab: inspectorTab,
        jsonTab: jsonTab,
        jsonPanel: jsonPanel,
        jsonOutput: jsonOutput,
        jsonError: jsonError,
        formatJsonButton: formatJsonButton,
        state: state,
        shouldDeferHistoryCommit: shouldDeferHistoryCommit,
        markHistoryDeferred: function () {
            pendingHistoryCommit = true;
        },
        commitHistory: function () {
            recordHistoryChange(state);
        },
        syncJsonOutput: syncJsonOutput,
        renderInspector: renderInspector
    });
}

function renderInspector(inspector, state) {
    inspector.innerHTML = "";
    DrawObject(inspector, "json", state.json, undefined, state.jsonBinding);
}

function syncJsonOutput(jsonOutput, state) {
    jsonOutput.value = JSON.stringify(state.json, null, 2);
    if (typeof syncJsonLineNumbers === "function") {
        syncJsonLineNumbers(jsonOutput);
    }
}

function ensureHistory(state) {
    if (state.history) return state.history;
    var initialTypeHints = typeof exportTypeHintsSnapshot === "function" ? exportTypeHintsSnapshot() : {};
    state.history = {
        undoStack: [],
        redoStack: [],
        committed: {
            json: deepClone(state.json),
            typeHints: deepClone(initialTypeHints)
        },
        isApplying: false,
        maxEntries: 400
    };
    return state.history;
}

function recordHistoryChange(state) {
    var history = ensureHistory(state);
    if (history.isApplying) return;
    var nextTypeHints = typeof exportTypeHintsSnapshot === "function" ? exportTypeHintsSnapshot() : {};
    var jsonOps = [];
    var typeHintOps = [];
    collectDiffOps(history.committed.json, state.json, [], jsonOps);
    collectDiffOps(history.committed.typeHints, nextTypeHints, [], typeHintOps);
    if (jsonOps.length === 0 && typeHintOps.length === 0) return;
    var historyEntry = {
        forward: {
            jsonOps: jsonOps,
            typeHintOps: typeHintOps
        },
        backward: {
            jsonOps: invertOps(jsonOps),
            typeHintOps: invertOps(typeHintOps)
        }
    };
    history.undoStack.push(historyEntry);
    if (history.undoStack.length > history.maxEntries) {
        history.undoStack.shift();
    }
    history.redoStack.length = 0;
    history.committed = {
        json: deepClone(state.json),
        typeHints: deepClone(nextTypeHints)
    };
}

function undoHistory(state) {
    var history = ensureHistory(state);
    if (history.undoStack.length === 0) return false;
    var historyEntry = history.undoStack.pop();
    history.isApplying = true;
    state.json = applyOpsToValue(state.json, historyEntry.backward.jsonOps);
    var currentTypeHints = typeof exportTypeHintsSnapshot === "function" ? exportTypeHintsSnapshot() : {};
    var nextTypeHints = applyOpsToValue(currentTypeHints, historyEntry.backward.typeHintOps);
    if (typeof importTypeHintsSnapshot === "function") {
        importTypeHintsSnapshot(nextTypeHints);
    }
    state.jsonBinding.parent = state;
    history.isApplying = false;
    history.redoStack.push(historyEntry);
    history.committed = {
        json: deepClone(state.json),
        typeHints: deepClone(nextTypeHints)
    };
    return true;
}

function redoHistory(state) {
    var history = ensureHistory(state);
    if (history.redoStack.length === 0) return false;
    var historyEntry = history.redoStack.pop();
    history.isApplying = true;
    state.json = applyOpsToValue(state.json, historyEntry.forward.jsonOps);
    var currentTypeHints = typeof exportTypeHintsSnapshot === "function" ? exportTypeHintsSnapshot() : {};
    var nextTypeHints = applyOpsToValue(currentTypeHints, historyEntry.forward.typeHintOps);
    if (typeof importTypeHintsSnapshot === "function") {
        importTypeHintsSnapshot(nextTypeHints);
    }
    state.jsonBinding.parent = state;
    history.isApplying = false;
    history.undoStack.push(historyEntry);
    history.committed = {
        json: deepClone(state.json),
        typeHints: deepClone(nextTypeHints)
    };
    return true;
}

function deepClone(value) {
    if (value === undefined) return undefined;
    return JSON.parse(JSON.stringify(value));
}

function isObjectValue(value) {
    return value !== null && typeof value === "object" && !Array.isArray(value);
}

function createSetOp(path, value, hadValue, oldValue) {
    return {
        type: "set",
        path: path.slice(),
        value: deepClone(value),
        hadValue: !!hadValue,
        oldValue: hadValue ? deepClone(oldValue) : undefined
    };
}

function createRemoveOp(path, oldValue) {
    return {
        type: "remove",
        path: path.slice(),
        oldValue: deepClone(oldValue)
    };
}

function collectDiffOps(prevValue, nextValue, path, ops) {
    if (Array.isArray(prevValue) || Array.isArray(nextValue)) {
        if (!Array.isArray(prevValue) || !Array.isArray(nextValue) || JSON.stringify(prevValue) !== JSON.stringify(nextValue)) {
            ops.push(createSetOp(path, nextValue, true, prevValue));
        }
        return;
    }
    if (isObjectValue(prevValue) && isObjectValue(nextValue)) {
        var prevKeys = Object.keys(prevValue);
        var nextKeys = Object.keys(nextValue);
        var sameKeyCount = prevKeys.length === nextKeys.length;
        var sameKeyOrder = sameKeyCount && prevKeys.every(function (key, index) {
            return key === nextKeys[index];
        });
        if (!sameKeyOrder) {
            ops.push(createSetOp(path, nextValue, true, prevValue));
            return;
        }
        Object.keys(prevValue).forEach(function (key) {
            if (Object.prototype.hasOwnProperty.call(nextValue, key)) return;
            ops.push(createRemoveOp(path.concat(key), prevValue[key]));
        });
        Object.keys(nextValue).forEach(function (key) {
            if (Object.prototype.hasOwnProperty.call(prevValue, key)) {
                collectDiffOps(prevValue[key], nextValue[key], path.concat(key), ops);
                return;
            }
            ops.push(createSetOp(path.concat(key), nextValue[key], false, undefined));
        });
        return;
    }
    if (prevValue === nextValue) return;
    if (Number.isNaN(prevValue) && Number.isNaN(nextValue)) return;
    ops.push(createSetOp(path, nextValue, true, prevValue));
}

function invertOps(ops) {
    var inverse = [];
    for (var i = ops.length - 1; i >= 0; i--) {
        var op = ops[i];
        if (op.type === "remove") {
            inverse.push({
                type: "set",
                path: op.path.slice(),
                value: deepClone(op.oldValue),
                hadValue: false,
                oldValue: undefined
            });
            continue;
        }
        if (op.hadValue) {
            inverse.push({
                type: "set",
                path: op.path.slice(),
                value: deepClone(op.oldValue),
                hadValue: true,
                oldValue: deepClone(op.value)
            });
            continue;
        }
        inverse.push({
            type: "remove",
            path: op.path.slice(),
            oldValue: deepClone(op.value)
        });
    }
    return inverse;
}

function applyOpsToValue(rootValue, ops) {
    var holder = { root: rootValue };
    ops.forEach(function (op) {
        if (op.type === "set") {
            setPathValue(holder, "root", op.path, op.value);
            return;
        }
        if (op.type === "remove") {
            removePathValue(holder, "root", op.path);
        }
    });
    return holder.root;
}

function setPathValue(holder, rootKey, path, value) {
    if (path.length === 0) {
        holder[rootKey] = deepClone(value);
        return;
    }
    var node = holder[rootKey];
    if (node === undefined || node === null || typeof node !== "object") {
        node = typeof path[0] === "number" ? [] : {};
        holder[rootKey] = node;
    }
    for (var i = 0; i < path.length - 1; i++) {
        var key = path[i];
        var nextKey = path[i + 1];
        if (node[key] === undefined || node[key] === null || typeof node[key] !== "object") {
            node[key] = typeof nextKey === "number" ? [] : {};
        }
        node = node[key];
    }
    node[path[path.length - 1]] = deepClone(value);
}

function removePathValue(holder, rootKey, path) {
    if (path.length === 0) return;
    var node = holder[rootKey];
    if (node === undefined || node === null || typeof node !== "object") return;
    for (var i = 0; i < path.length - 1; i++) {
        var key = path[i];
        if (node[key] === undefined || node[key] === null || typeof node[key] !== "object") return;
        node = node[key];
    }
    var lastKey = path[path.length - 1];
    if (Array.isArray(node) && typeof lastKey === "number") {
        node.splice(lastKey, 1);
        return;
    }
    delete node[lastKey];
}

function shouldDeferHistoryCommit(activeElement) {
    if (!activeElement) return false;
    if (activeElement.tagName === "TEXTAREA") return true;
    if (activeElement.tagName !== "INPUT") return false;
    return String(activeElement.type || "").toLowerCase() === "text";
}

function captureFoldoutStates(inspector) {
    var stateByPath = {};
    inspector.querySelectorAll(".foldout-frame[data-binding-path]").forEach(function (frame) {
        var path = frame.getAttribute("data-binding-path");
        if (!path) return;
        stateByPath[path] = frame.classList.contains("collapsed");
    });
    return stateByPath;
}

function applyFoldoutStates(inspector, stateByPath) {
    if (!stateByPath) return;
    inspector.querySelectorAll(".foldout-frame[data-binding-path]").forEach(function (frame) {
        var path = frame.getAttribute("data-binding-path");
        if (!path || !Object.prototype.hasOwnProperty.call(stateByPath, path)) return;
        var shouldBeCollapsed = !!stateByPath[path];
        var valueEl = frame.querySelector(".object-value, .array-value");
        var toggleEl = frame.querySelector(".foldout-toggle");
        if (shouldBeCollapsed) {
            frame.classList.add("collapsed");
            if (valueEl) valueEl.hidden = true;
            if (toggleEl) toggleEl.textContent = "▸";
            return;
        }
        frame.classList.remove("collapsed");
        if (valueEl) valueEl.hidden = false;
        if (toggleEl) toggleEl.textContent = "▾";
    });
}

function registerHistoryShortcuts(target, onUndo, onRedo) {
    target.addEventListener("keydown", function (event) {
        if (event.altKey) return;
        var active = document.activeElement;
        var isTypingTarget = !!active && (
            active.tagName === "INPUT" ||
            active.tagName === "TEXTAREA" ||
            active.isContentEditable
        );
        if (isTypingTarget) return;
        var key = String(event.key || "").toLowerCase();
        var hasPrimaryModifier = event.metaKey || event.ctrlKey;
        if (!hasPrimaryModifier) return;
        var isUndo = key === "z" && !event.shiftKey;
        var isRedo = (key === "z" && event.shiftKey) || (!event.metaKey && key === "y");
        if (!isUndo && !isRedo) return;
        event.preventDefault();
        if (isUndo) {
            onUndo();
            return;
        }
        onRedo();
    });
}

function placeEditorInCenter(editor) {
    var rect = editor.getBoundingClientRect();
    var left = Math.max(12, Math.round((window.innerWidth - rect.width) / 2));
    var top = Math.max(12, Math.round((window.innerHeight - rect.height) / 2));
    editor.style.left = left + "px";
    editor.style.top = top + "px";
}

function enableEditorDragging(editor, dragHandle) {
    var dragging = false;
    var startX = 0;
    var startY = 0;
    var originLeft = 0;
    var originTop = 0;

    dragHandle.addEventListener("mousedown", function (event) {
        if (event.button !== 0) return;
        dragging = true;
        startX = event.clientX;
        startY = event.clientY;
        originLeft = editor.offsetLeft;
        originTop = editor.offsetTop;
        document.body.style.userSelect = "none";
    });

    window.addEventListener("mousemove", function (event) {
        if (!dragging) return;
        var nextLeft = originLeft + event.clientX - startX;
        var nextTop = originTop + event.clientY - startY;
        var maxLeft = Math.max(12, window.innerWidth - editor.offsetWidth - 12);
        var maxTop = Math.max(12, window.innerHeight - editor.offsetHeight - 12);
        editor.style.left = Math.min(Math.max(12, nextLeft), maxLeft) + "px";
        editor.style.top = Math.min(Math.max(12, nextTop), maxTop) + "px";
    });

    window.addEventListener("mouseup", function () {
        dragging = false;
        document.body.style.userSelect = "";
    });
}

document.addEventListener("DOMContentLoaded", main);
